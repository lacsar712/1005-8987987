{% extends 'base.html' %}

{% block content %}
<div class="mb-8">
    <div class="flex items-center text-sm text-gray-500 mb-4">
        <a href="{{ url_for('index') }}" class="hover:text-primary transition flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            返回首页
        </a>
        <span class="mx-2">/</span>
        <span class="text-gray-800 font-medium">重命名历史</span>
    </div>

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">重命名历史</h1>
            <p class="text-gray-600">查看所有批量重命名操作记录，可一键回滚最近一次操作</p>
        </div>
        <div class="flex items-center gap-3">
            <select id="album-filter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-primary focus:border-primary">
                <option value="">全部相册</option>
                {% for album in albums %}
                <option value="{{ album.id }}">{{ album.title }}</option>
                {% endfor %}
            </select>
            <button id="rollback-latest-btn" disabled class="bg-gray-300 text-gray-500 px-4 py-2 rounded-lg shadow flex items-center text-sm cursor-not-allowed">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                回滚最近一次
            </button>
        </div>
    </div>
</div>

<div id="history-container" class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="flex items-center justify-center py-16 text-gray-400">
        <svg class="animate-spin w-5 h-5 mr-2 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        加载中...
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadHistory();
        document.getElementById('album-filter').addEventListener('change', loadHistory);
        document.getElementById('rollback-latest-btn').addEventListener('click', rollbackLatest);
    });

    function showToast(message, type = 'success') {
        const Toast = Swal.mixin({
            toast: true,
            position: 'top',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        });
        Toast.fire({ icon: type, title: message });
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s || '';
        return div.innerHTML;
    }

    async function loadHistory() {
        const albumId = document.getElementById('album-filter').value;
        const container = document.getElementById('history-container');
        container.innerHTML = '<div class="flex items-center justify-center py-16 text-gray-400"><svg class="animate-spin w-5 h-5 mr-2 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>加载中...</div>';

        try {
            const url = albumId ? `/rename/api/history?album_id=${albumId}` : '/rename/api/history';
            const r = await fetch(url);
            const data = await r.json();
            if (!data.success) throw new Error(data.message);
            renderHistory(data.histories);
        } catch (e) {
            container.innerHTML = `<div class="text-red-500 text-sm py-8 text-center">加载失败: ${e.message}</div>`;
        }
    }

    function updateRollbackBtnState(histories) {
        const btn = document.getElementById('rollback-latest-btn');
        const hasApplied = histories && histories.some(h => h.is_applied);
        if (hasApplied) {
            btn.disabled = false;
            btn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
            btn.classList.add('bg-red-500', 'hover:bg-red-600', 'text-white');
        } else {
            btn.disabled = true;
            btn.classList.add('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
            btn.classList.remove('bg-red-500', 'hover:bg-red-600', 'text-white');
        }
    }

    function renderHistory(histories) {
        const container = document.getElementById('history-container');
        updateRollbackBtnState(histories);
        if (!histories || histories.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16">
                    <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p class="text-gray-500 mb-2">暂无重命名记录</p>
                    <p class="text-sm text-gray-400">在相册详情页多选照片后进行批量重命名，记录将显示在此处</p>
                </div>
            `;
            return;
        }

        const html = `
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">时间</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">相册</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">规则描述</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">照片数</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">状态</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        ${histories.map(h => `
                            <tr class="hover:bg-gray-50 transition">
                                <td class="px-4 py-3 whitespace-nowrap text-gray-700">
                                    <div class="font-medium">${escapeHtml(formatDate(h.created_at))}</div>
                                    ${h.rolled_back_at ? `<div class="text-xs text-gray-400 mt-0.5">回滚于 ${escapeHtml(formatDate(h.rolled_back_at))}</div>` : ''}
                                </td>
                                <td class="px-4 py-3 text-gray-700">
                                    ${h.album_title ? escapeHtml(h.album_title) : '<span class="text-gray-400">已删除</span>'}
                                </td>
                                <td class="px-4 py-3 text-gray-600">
                                    <div class="max-w-md truncate" title="${escapeHtml(h.rule_description)}">
                                        ${escapeHtml(h.rule_description)}
                                    </div>
                                </td>
                                <td class="px-4 py-3 text-center text-gray-700 font-medium">${h.photo_count}</td>
                                <td class="px-4 py-3 text-center">
                                    ${h.is_applied
                                        ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-200"><span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1.5"></span>已应用</span>'
                                        : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200"><span class="w-1.5 h-1.5 rounded-full bg-gray-400 mr-1.5"></span>已回滚</span>'}
                                </td>
                                <td class="px-4 py-3 text-center">
                                    ${h.is_applied
                                        ? `<button onclick="rollbackHistory(${h.id})" class="text-red-500 hover:text-red-700 text-sm font-medium transition">回滚</button>`
                                        : '<span class="text-gray-300 text-sm">-</span>'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        container.innerHTML = html;
    }

    function formatDate(isoStr) {
        if (!isoStr) return '';
        try {
            const d = new Date(isoStr);
            return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        } catch {
            return isoStr;
        }
    }

    function rollbackHistory(id) {
        Swal.fire({
            title: '确认回滚？',
            text: '将把该次操作涉及的所有照片恢复为原始名称',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '确认回滚',
            cancelButtonText: '取消',
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6b7280',
        }).then(async (result) => {
            if (!result.isConfirmed) return;
            try {
                const r = await fetch(`/rename/api/history/${id}/rollback`, { method: 'POST' });
                const data = await r.json();
                if (!data.success) throw new Error(data.message);
                showToast(data.message, 'success');
                setTimeout(loadHistory, 500);
            } catch (e) {
                showToast(`回滚失败: ${e.message}`, 'error');
            }
        });
    }

    async function rollbackLatest() {
        const albumId = document.getElementById('album-filter').value || null;
        const btn = document.getElementById('rollback-latest-btn');
        if (btn.disabled) {
            showToast('没有可回滚的操作', 'warning');
            return;
        }

        const confirmResult = await Swal.fire({
            title: '回滚最近一次操作？',
            text: albumId ? '将回滚当前筛选相册的最近一次批量重命名' : '将回滚全局最近一次批量重命名操作',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '确认回滚',
            cancelButtonText: '取消',
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6b7280',
        });
        if (!confirmResult.isConfirmed) return;

        try {
            const r = await fetch('/rename/api/history/rollback-latest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ album_id: albumId ? parseInt(albumId) : null })
            });
            const data = await r.json();
            if (!data.success) throw new Error(data.message);
            showToast(data.message, 'success');
            setTimeout(loadHistory, 500);
        } catch (e) {
            showToast(`回滚失败: ${e.message}`, 'error');
        }
    }
</script>
{% endblock %}
