{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{{ url_for('index') }}" class="text-gray-500 hover:text-gray-700 text-sm flex items-center mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            返回首页
        </a>
        <h1 class="text-3xl font-bold text-gray-900">新建相册</h1>
    </div>
    
    <div class="bg-white rounded-xl shadow-sm p-8 border border-gray-100">
        <form method="POST" onsubmit="return handleFormSubmit(this)">
            <div class="mb-6">
                <label for="title" class="block text-sm font-medium text-gray-700 mb-1">相册名称 <span class="text-red-500">*</span></label>
                <input type="text" name="title" id="title" required placeholder="例如：2026年春节"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
            </div>
            
            <div class="mb-8">
                <label for="description" class="block text-sm font-medium text-gray-700 mb-1">描述 (可选)</label>
                <textarea name="description" id="description" rows="4" placeholder="记录美好时刻..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition resize-none"></textarea>
            </div>
            
            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('index') }}" class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">取消</a>
                <button type="submit" class="px-6 py-2.5 bg-primary hover:bg-blue-600 text-white rounded-lg shadow-sm transition">
                    创建相册
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
