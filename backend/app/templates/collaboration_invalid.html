{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto text-center py-20">
    <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-red-50 flex items-center justify-center">
        <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">链接无效</h1>
    <p class="text-gray-500 mb-8">
        {% if not link.is_active %}
            该协作链接已被管理员撤销。
        {% elif link.expires_at %}
            该协作链接已过期。
        {% else %}
            该协作链接已达到最大上传数量限制。
        {% endif %}
    </p>
    <a href="{{ url_for('index') }}" class="inline-block bg-primary hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg font-medium transition shadow-md">
        返回首页
    </a>
</div>
{% endblock %}
